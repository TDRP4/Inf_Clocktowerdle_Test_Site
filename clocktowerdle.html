<!DOCTYPE html>
<meta charset="utf-8">
<html>
<head>
    <title>Infinite Clocktowerdle (v0.6)</title>
    <link rel="icon" type="img/png" href="https://i.postimg.cc/4NZpsvk8/Yaggababble-3D-Model-Icon.png">
    <link rel="stylesheet" href="clocktowerdle.css">
</head>

<link href='https://fonts.googleapis.com/css?family=MedievalSharp' rel='stylesheet'>

<body>

    <div style="display: flex; flex-direction: column; justify-content: center; padding: 4vh; text-align: center; align-items: center; row-gap: 2vh;">
        <p style="text-shadow: none;">Infinite Clocktowerdle v0.6</p>
        <p style="color: red; text-shadow: none; font-size: 4vh; margin: 0;">WARNING: THIS IS A TEST SITE; NOT THE OFFICIAL VERSION</p>
    </div>

    <div style="display: flex; justify-content: center; gap: 25vh;">
        <p id="leaderboardTxt" onclick="viewBoard()">Leaderboard</p>
        <p id="avgGuesses"></p>
    </div>

    <div style="display: flex; width: 100%; height: 100vh; justify-content: center;">
        <div id="content"> <!--Content Wrapper-->
            <div id="topContent">
                <div id="characters">
                    <label>Choose a character:</label>
                    <select>
                        <option></option>
                    </select>
                </div>

                <button onclick="subChar()">Guess</button>
            </div>

            <div id="congratsMsg">
                <p style="font-size: 5vh; color: red; text-shadow: 0.1vh 0.1vh 0.5vh #800000;">Congratulations!</p>
                <p>You guessed it!</p>
            </div>

            <div id="guessCount"><p></p></div>

            <button onclick="startWordle()" id="resetPage" style="display: none;">New Clocktowerdle -></button>

            <!--Append Child-->
            <div id="answerWrapper">
                <div id="answerText">
                    <p>Character</p>
                    <p>Original Script</p>
                    <p>Character Type</p>
                    <p>Wakes in the Night</p>
                    <p>Selects Player</p>
                    <p>Learns Info</p>
                    <p>Ability Details</p>
                </div>
                <div id="guesses"></div>
            </div>
        </div> <!--Content Wrapper-->
    </div>

    <div id="leaderboard">

        <p id="closeBtn" onclick="closeBoard()">x</p>

        <table>
            <tr>
                <th>Top Users:</th>
            </tr>
        </table>
    </div>

</body>

<script src="clocktowerdle.js"></script>

</html>
