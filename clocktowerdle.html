<!DOCTYPE html>
<meta charset="utf-8">
<html>
<head>
    <title>Infinite Clocktowerdle</title>
    <link rel="stylesheet" href="clocktowerdle.css">
</head>

<link href='https://fonts.googleapis.com/css?family=MedievalSharp' rel='stylesheet'>

<body>

    <div style="display: flex; width: 100%; height: 100vh; justify-content: center;">
        <div id="content"> <!--Content Wrapper-->
            <div style="display: flex; flex-direction: column; align-items: center; row-gap: 1vh;">
                <div id="characters">
                    <label style="color: white;">Choose a character:</label>
                    <select>
                        <option></option>
                    </select>
                </div>

                <button onclick="subChar()">Guess</button>
            </div>

            <div id="congratsMsg">
                <p style="font-size: 5vh; color: lime;">Congratulations!</p>
                <p style="color: white;">You guessed it!</p>
            </div>

            <div id="guessCount"><p style="color: white;"></p></div>

            <button onclick="startWordle()" id="resetPage" style="display: none;">New Clocktowerdle -></button>

            <!--Append Child-->
            <div id="answerWrapper">
                <div id="answerText">
                    <p>Character</p>
                    <p>Original Script</p>
                    <p>Character Type</p>
                    <p>Wakes in the Night</p>
                    <p>Selects Player</p>
                    <p>Learns Info</p>
                    <p>Ability Details</p>
                </div>
                <div id="guesses"></div>
            </div>

        </div> <!--Content Wrapper-->
    </div>
    

</body>

<script src="clocktowerdle.js"></script>

</html>
